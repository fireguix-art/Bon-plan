<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BonsPlansAuto – Bons plans Amazon du jour</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #FF9900;
    --orange-dark: #e68a00;
    --bg: #f4f4f2;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --muted: #666;
    --hint: #999;
    --danger-bg: #fff0f0;
    --danger-text: #c0392b;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a; --surface: #242424; --border: rgba(255,255,255,0.1);
      --text: #f0f0f0; --muted: #aaa; --hint: #666;
      --danger-bg: #2d1a1a; --danger-text: #ff6b6b;
    }
  }

  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .topbar { background: #232F3E; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-icon { width: 34px; height: 34px; background: var(--orange); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-name { font-size: 18px; font-weight: 600; color: #fff; }
  .logo-name span { color: var(--orange); }
  .topbar-right { font-size: 12px; color: rgba(255,255,255,0.5); }
  .topbar-right strong { color: rgba(255,255,255,0.85); }

  .hero { background: #232F3E; padding: 0 1.5rem 1.25rem; border-bottom: 3px solid var(--orange); }
  .stats-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .stat { background: rgba(255,255,255,0.07); border-radius: var(--radius-sm); padding: 10px 18px; }
  .stat-label { font-size: 11px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .stat-val { font-size: 22px; font-weight: 600; color: #fff; }
  .stat-val small { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.5); }

  .toolbar { padding: 1rem 1.5rem; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  .cat-btn { font-size: 13px; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .cat-btn:hover { background: var(--bg); }
  .cat-btn.active { background: var(--orange); color: #fff; border-color: var(--orange); font-weight: 500; }
  .spacer { flex: 1; }
  .sort-select { font-size: 13px; padding: 5px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; }
  .refresh-btn { font-size: 13px; padding: 5px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .refresh-btn:hover { background: var(--bg); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin.active { display: inline-block; animation: spin 0.6s linear; }

  .main { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
  .update-bar { font-size: 12px; color: var(--muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #2ecc71; display: inline-block; flex-shrink: 0; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: transform 0.15s, box-shadow 0.15s; display: flex; flex-direction: column; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .card-img { height: 130px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 44px; position: relative; flex-shrink: 0; }
  .badge { position: absolute; top: 8px; left: 8px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
  .badge-flash { background: var(--danger-bg); color: var(--danger-text); }
  .badge-prime { background: #232F3E; color: var(--orange); }
  .badge-deal  { background: var(--orange); color: #fff; }
  .card-body { padding: 10px 12px 0; flex: 1; }
  .card-cat { font-size: 10px; color: var(--hint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 10px; min-height: 36px; }
  .price-row { display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; margin-bottom: 5px; }
  .price-now { font-size: 20px; font-weight: 700; color: var(--text); }
  .price-was { font-size: 12px; color: var(--hint); text-decoration: line-through; }
  .discount-pill { font-size: 12px; font-weight: 600; color: var(--danger-text); background: var(--danger-bg); padding: 2px 7px; border-radius: 5px; }
  .stars { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; margin-top: 6px; margin-bottom: 8px; }
  .stars-val { color: var(--orange); font-weight: 600; }
  .card-footer { padding: 10px 12px 12px; margin-top: auto; }
  .btn-amazon { display: block; width: 100%; padding: 8px; background: var(--orange); color: #fff; text-align: center; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; border: none; cursor: pointer; text-decoration: none; transition: background 0.15s; }
  .btn-amazon:hover { background: var(--orange-dark); }

  .state { text-align: center; padding: 4rem 1rem; color: var(--muted); grid-column: 1 / -1; }
  .state-icon { font-size: 48px; margin-bottom: 1rem; }
  .state h3 { font-size: 18px; font-weight: 500; margin-bottom: 0.5rem; color: var(--text); }
  .state p { font-size: 14px; line-height: 1.6; }

  .footer { text-align: center; padding: 2rem 1.5rem; font-size: 12px; color: var(--hint); border-top: 1px solid var(--border); margin-top: 2rem; }
  .footer a { color: var(--orange); text-decoration: none; }
</style>
</head>
<body>

<header>
  <div class="topbar">
    <a class="logo" href="#">
      <div class="logo-icon">🎯</div>
      <span class="logo-name">Bons<span>Plans</span>Auto</span>
    </a>
    <div class="topbar-right">Prochaine maj : <strong id="next-update">–</strong></div>
  </div>
  <div class="hero">
    <div class="stats-row">
      <div class="stat"><div class="stat-label">Bons plans</div><div class="stat-val" id="stat-count">–</div></div>
      <div class="stat"><div class="stat-label">Remise moyenne</div><div class="stat-val" id="stat-avg">–</div></div>
      <div class="stat"><div class="stat-label">Meilleure remise</div><div class="stat-val" id="stat-best">–</div></div>
      <div class="stat"><div class="stat-label">Données du</div><div class="stat-val" id="stat-date" style="font-size:14px;padding-top:5px;">–</div></div>
    </div>
  </div>
</header>

<nav class="toolbar">
  <button class="cat-btn active" data-cat="all">Tous</button>
  <button class="cat-btn" data-cat="tech">Tech</button>
  <button class="cat-btn" data-cat="maison">Maison</button>
  <button class="cat-btn" data-cat="mode">Mode</button>
  <button class="cat-btn" data-cat="sport">Sport</button>
  <button class="cat-btn" data-cat="beaute">Beauté</button>
  <div class="spacer"></div>
  <select class="sort-select" id="sort-select">
    <option value="discount">Meilleure remise</option>
    <option value="price_asc">Prix croissant</option>
    <option value="price_desc">Prix décroissant</option>
    <option value="stars">Mieux notés</option>
  </select>
  <button class="refresh-btn" id="refresh-btn"><span class="spin" id="spin">↻</span> Actualiser</button>
</nav>

<main class="main">
  <div class="update-bar"><span class="dot"></span><span id="update-label">Chargement…</span></div>
  <div class="grid" id="grid">
    <div class="state"><div class="state-icon">⏳</div><h3>Chargement des données…</h3><p>Lecture de <code>data/deals.json</code></p></div>
  </div>
</main>

<footer class="footer">
  <p>Liens affiliés Amazon — prix vérifiés automatiquement 3× par jour via <a href="#">scraper.py</a></p>
</footer>

<script>
let allDeals = [];
let currentCat = 'all';
let currentSort = 'discount';

async function loadDeals() {
  document.getElementById('spin').classList.add('active');
  try {
    const res = await fetch('data/deals.json?t=' + Date.now());
    if (!res.ok) throw new Error('Fichier introuvable (HTTP ' + res.status + ')');
    const data = await res.json();
    allDeals = data.deals || [];
    updateStats(data);
    render();
  } catch (e) {
    document.getElementById('grid').innerHTML = `
      <div class="state">
        <div class="state-icon">⚠️</div>
        <h3>Impossible de charger les données</h3>
        <p>Vérifiez que <code>data/deals.json</code> existe et que le serveur web tourne.<br>
        <br>Lancez : <code>python -m http.server 8080</code> dans le dossier du projet.<br>
        <br>Erreur : ${e.message}</p>
      </div>`;
    document.getElementById('update-label').textContent = 'Erreur de chargement';
  } finally {
    setTimeout(() => document.getElementById('spin').classList.remove('active'), 700);
  }
}

function updateStats(data) {
  document.getElementById('stat-count').textContent = data.count;
  document.getElementById('stat-avg').innerHTML = data.avg_discount + '<small> %</small>';
  const best = Math.max(...allDeals.map(d => d.discount));
  document.getElementById('stat-best').innerHTML = best + '<small> %</small>';

  const dt = new Date(data.updated_at);
  document.getElementById('stat-date').textContent =
    dt.toLocaleDateString('fr-BE', { day:'numeric', month:'short' }) + ' ' +
    dt.toLocaleTimeString('fr-BE', { hour:'2-digit', minute:'2-digit' });

  document.getElementById('update-label').textContent =
    'Dernière mise à jour : ' + dt.toLocaleString('fr-BE', { dateStyle:'medium', timeStyle:'short' });

  const slots = [[8,0],[12,30],[19,0]];
  const now = new Date();
  let next = null;
  for (const [h,m] of slots) {
    const t = new Date(now); t.setHours(h, m, 0, 0);
    if (t > now) { next = t; break; }
  }
  if (!next) { next = new Date(now); next.setDate(next.getDate() + 1); next.setHours(8,0,0,0); }
  const diff = Math.floor((next - now) / 1000);
  document.getElementById('next-update').textContent =
    String(Math.floor(diff / 3600)).padStart(2,'0') + 'h' +
    String(Math.floor((diff % 3600) / 60)).padStart(2,'0');
}

function render() {
  let deals = currentCat === 'all' ? [...allDeals] : allDeals.filter(d => d.cat === currentCat);
  if (currentSort === 'discount')   deals.sort((a,b) => b.discount - a.discount);
  if (currentSort === 'price_asc')  deals.sort((a,b) => a.price - b.price);
  if (currentSort === 'price_desc') deals.sort((a,b) => b.price - a.price);
  if (currentSort === 'stars')      deals.sort((a,b) => b.stars - a.stars);

  const grid = document.getElementById('grid');
  if (!deals.length) {
    grid.innerHTML = `<div class="state"><div class="state-icon">🔍</div><h3>Aucun bon plan dans cette catégorie</h3></div>`;
    return;
  }
  grid.innerHTML = deals.map(d => {
    const bcls = d.badge === 'flash' ? 'badge-flash' : d.badge === 'prime' ? 'badge-prime' : 'badge-deal';
    const btxt = d.badge === 'flash' ? '⚡ Flash' : d.badge === 'prime' ? '★ Prime' : '-' + d.discount + '%';
    return `<div class="card">
      <div class="card-img">${d.emoji}<span class="badge ${bcls}">${btxt}</span></div>
      <div class="card-body">
        <div class="card-cat">${d.cat}</div>
        <div class="card-title">${d.title}</div>
        <div class="price-row">
          <span class="price-now">${d.price.toFixed(2)} €</span>
          <span class="price-was">${d.was.toFixed(2)} €</span>
        </div>
        <span class="discount-pill">-${d.discount}%</span>
        <div class="stars"><span class="stars-val">${d.stars} ★</span><span>(${d.reviews.toLocaleString('fr-FR')} avis)</span></div>
      </div>
      <div class="card-footer">
        <a class="btn-amazon" href="${d.affiliate_url}" target="_blank" rel="noopener">Voir sur Amazon →</a>
      </div>
    </div>`;
  }).join('');
}

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    render();
  });
});
document.getElementById('sort-select').addEventListener('change', e => { currentSort = e.target.value; render(); });
document.getElementById('refresh-btn').addEventListener('click', loadDeals);

loadDeals();
setInterval(loadDeals, 5 * 60 * 1000);
</script>
</body>
</html>
